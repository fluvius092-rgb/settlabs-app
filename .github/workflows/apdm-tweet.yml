name: APDM Auto Tweet

on:
  schedule:
    - cron: '0 */6 * * *'  # 6時間ごと
  workflow_dispatch: {}     # 手動実行用

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch incidents & post tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEOAPIFY_KEY: ${{ secrets.GEOAPIFY_KEY }}
        run: node scripts/apdm-tweet.js

      - name: Commit posted tracking
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apdm-posted.json
          git diff --cached --quiet || git commit -m "chore(apdm): update posted incidents tracker"
          git push
