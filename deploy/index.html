<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SettLabs</title>
<meta name="theme-color" content="#08090c">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7502065458216315" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08090c; color: #b8ccd8; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 { font-size: 2rem; letter-spacing: 4px; color: #00c8f0; margin-bottom: 32px; }
  .games { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 0 16px; }
  .game-card { display: block; width: 280px; background: #0d1117; border: 1px solid #1a2a3a; border-radius: 12px; text-decoration: none; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .game-card:hover { border-color: #00c8f0; transform: translateY(-4px); }
  .game-card img { width: 100%; height: 160px; object-fit: cover; }
  .game-card .info { padding: 16px; }
  .game-card .info h2 { font-size: 1rem; color: #fff; margin-bottom: 6px; }
  .game-card .info p { font-size: 0.75rem; color: #6a8090; line-height: 1.5; }
</style>
</head>
<body>
<h1>SETTLABS</h1>
<div class="games">
  <a href="/scp_card_battle/" class="game-card">
    <img src="/scp_card_battle/og-image.png" alt="SCP Card Battle">
    <div class="info">
      <h2>SCP Card Battle</h2>
      <p>SCP財団をテーマにしたカードバトルゲーム。250体以上のSCPカードを集めてデッキを組み、オンライン対戦に挑め。</p>
    </div>
  </a>
</div>
<footer style="margin-top:48px;font-size:0.7rem;color:#4a6070;text-align:center">
  <a href="/privacy.html" style="color:#6a8090;text-decoration:none">Privacy Policy</a>
</footer>
</body>
</html>
