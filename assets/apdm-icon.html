<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center; width: 400px; height: 400px; background: #0d1117; overflow: hidden; }
  .icon {
    width: 400px; height: 400px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    background: radial-gradient(circle at 50% 55%, #131a24 0%, #0d1117 70%);
  }
  /* レーダー同心円 */
  .radar-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(47,129,247,0.12);
  }
  .r1 { width: 360px; height: 360px; }
  .r2 { width: 280px; height: 280px; }
  .r3 { width: 200px; height: 200px; }
  .r4 { width: 120px; height: 120px; }
  /* レーダースイープ */
  .sweep {
    position: absolute; width: 180px; height: 180px;
    top: calc(50% - 90px); left: calc(50% - 90px);
    background: conic-gradient(from 200deg, transparent 0deg, rgba(47,129,247,0.08) 30deg, transparent 60deg);
    border-radius: 50%;
  }
  /* シールド */
  .shield {
    position: relative; z-index: 2;
    width: 160px; height: 180px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .shield svg { position: absolute; top: 0; left: 0; }
  .title {
    position: relative; z-index: 3;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 800; font-size: 52px;
    letter-spacing: 4px;
    color: #e6edf3;
    text-shadow: 0 0 30px rgba(47,129,247,0.4);
  }
  .sub {
    position: relative; z-index: 3;
    font-family: 'Segoe UI', sans-serif;
    font-size: 11px; letter-spacing: 5px;
    color: #2f81f7;
    margin-top: 2px;
    text-transform: uppercase;
  }
  /* アラートドット */
  .alert-dot {
    position: absolute; z-index: 5;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #f85149;
    box-shadow: 0 0 12px #f85149, 0 0 24px rgba(248,81,73,0.3);
    top: 80px; right: 95px;
  }
  /* グリッド線 */
  .grid-h, .grid-v {
    position: absolute;
    background: rgba(47,129,247,0.04);
  }
  .grid-h { width: 100%; height: 1px; }
  .grid-v { width: 1px; height: 100%; }
</style>
</head>
<body>
<div class="icon">
  <div class="grid-h" style="top:100px"></div>
  <div class="grid-h" style="top:200px"></div>
  <div class="grid-h" style="top:300px"></div>
  <div class="grid-v" style="left:100px"></div>
  <div class="grid-v" style="left:200px"></div>
  <div class="grid-v" style="left:300px"></div>
  <div class="radar-ring r1"></div>
  <div class="radar-ring r2"></div>
  <div class="radar-ring r3"></div>
  <div class="radar-ring r4"></div>
  <div class="sweep"></div>
  <div class="shield">
    <svg width="160" height="180" viewBox="0 0 160 180">
      <path d="M80 8 L150 45 L145 120 Q130 165 80 176 Q30 165 15 120 L10 45 Z"
            fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.3"/>
      <path d="M80 20 L140 52 L136 115 Q122 155 80 165 Q38 155 24 115 L20 52 Z"
            fill="none" stroke="#2f81f7" stroke-width="0.5" opacity="0.15"/>
    </svg>
    <div class="title">APDM</div>
    <div class="sub">Defense Monitor</div>
  </div>
  <div class="alert-dot"></div>
</div>
</body>
</html>
