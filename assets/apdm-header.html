<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center; width: 1500px; height: 500px; background: #0d1117; overflow: hidden; }
  .header {
    width: 1500px; height: 500px;
    position: relative;
    background: linear-gradient(135deg, #0d1117 0%, #111a28 40%, #0d1117 100%);
    display: flex; align-items: center;
    overflow: hidden;
  }
  /* グリッド背景 */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(47,129,247,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,129,247,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* 左側テキスト */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    margin-left: 100px;
    max-width: 520px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(47,129,247,0.1);
    border: 1px solid rgba(47,129,247,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 12px; letter-spacing: 3px;
    color: #2f81f7;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 20px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3fb950;
    box-shadow: 0 0 8px #3fb950;
  }
  .main-title {
    font-family: 'Segoe UI', sans-serif;
    font-weight: 800; font-size: 72px;
    letter-spacing: 6px;
    color: #e6edf3;
    text-shadow: 0 0 40px rgba(47,129,247,0.3);
    line-height: 1;
  }
  .main-title em { color: #2f81f7; font-style: normal; }
  .subtitle {
    font-family: 'Segoe UI', sans-serif;
    font-size: 18px; letter-spacing: 8px;
    color: #7d8590;
    margin-top: 12px;
    text-transform: uppercase;
  }
  .desc {
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    color: #484f58;
    margin-top: 24px;
    letter-spacing: 1px;
    line-height: 1.6;
  }
  /* 右側: サイトプレビュー */
  .preview-wrap {
    position: absolute;
    right: 40px; top: 30px;
    width: 780px; height: 440px;
    z-index: 8;
    perspective: 1200px;
  }
  .preview-frame {
    width: 780px; height: 440px;
    border-radius: 10px;
    border: 1px solid rgba(47,129,247,0.2);
    overflow: hidden;
    box-shadow:
      0 0 40px rgba(47,129,247,0.08),
      0 0 80px rgba(0,0,0,0.5),
      inset 0 0 40px rgba(0,0,0,0.2);
    transform: rotateY(-4deg) rotateX(1deg);
    position: relative;
    background: #0d1117;
  }
  .preview-frame::before {
    content: '';
    position: absolute; inset: 0; z-index: 100;
    background: linear-gradient(135deg, rgba(47,129,247,0.03) 0%, transparent 50%, rgba(0,0,0,0.15) 100%);
    pointer-events: none;
  }
  /* フェードマスク: 左右のエッジをぼかす */
  .preview-frame::after {
    content: '';
    position: absolute; inset: 0; z-index: 101;
    background: linear-gradient(90deg, #0d1117 0%, transparent 8%, transparent 95%, #0d1117 100%);
    pointer-events: none;
  }
  .preview-frame iframe {
    width: 1400px; height: 800px;
    border: none;
    transform: scale(0.557);
    transform-origin: top left;
    pointer-events: none;
  }
  /* ブラウザ風タイトルバー */
  .browser-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(22,27,34,0.95);
    border-bottom: 1px solid rgba(48,54,61,0.5);
    display: flex; align-items: center;
    padding: 0 10px;
    gap: 6px;
    z-index: 102;
  }
  .browser-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .browser-url {
    margin-left: 12px;
    background: rgba(13,17,23,0.6);
    border: 1px solid rgba(48,54,61,0.5);
    border-radius: 4px;
    padding: 2px 10px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 10px;
    color: #7d8590;
    letter-spacing: 0.5px;
  }
  /* ステータスバー */
  .status-bar {
    position: absolute; bottom: 20px; left: 100px; right: 100px;
    display: flex; gap: 40px; z-index: 10;
  }
  .stat {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Segoe UI', sans-serif;
  }
  .stat-icon { width: 8px; height: 8px; border-radius: 50%; }
  .stat-label {
    font-size: 11px; letter-spacing: 2px;
    color: #484f58; text-transform: uppercase;
  }
  /* アクセントライン */
  .accent-line {
    position: absolute; left: 0; right: 0; height: 2px; z-index: 10;
    background: linear-gradient(90deg, transparent 0%, #2f81f7 30%, #f85149 50%, #d29922 70%, transparent 100%);
    opacity: 0.4;
  }
  .accent-line.top { top: 0; }
  .accent-line.bottom { bottom: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="accent-line top"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="badge"><div class="badge-dot"></div>LIVE MONITORING</div>
    <div class="main-title"><em>APDM</em></div>
    <div class="subtitle">Asia-Pacific Defense Monitor</div>
    <div class="desc">
      Realtime defense incident tracking<br>
      Airspace violations / Maritime intrusions / Missile launches
    </div>
  </div>

  <!-- 右側: APDMサイトのプレビュー -->
  <div class="preview-wrap">
    <div class="preview-frame">
      <div class="browser-bar">
        <div class="browser-dot" style="background:#f85149"></div>
        <div class="browser-dot" style="background:#d29922"></div>
        <div class="browser-dot" style="background:#3fb950"></div>
        <span class="browser-url">settlabs.app/apdm/</span>
      </div>
      <iframe src="https://settlabs.app/apdm/" loading="eager" sandbox="allow-scripts allow-same-origin" style="margin-top:28px"></iframe>
    </div>
  </div>

  <div class="status-bar">
    <div class="stat">
      <div class="stat-icon" style="background:#f85149;box-shadow:0 0 6px #f85149"></div>
      <span class="stat-label">Danger</span>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:#d29922;box-shadow:0 0 6px #d29922"></div>
      <span class="stat-label">Warning</span>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:#2f81f7;box-shadow:0 0 6px #2f81f7"></div>
      <span class="stat-label">Info</span>
    </div>
    <div class="stat" style="margin-left:auto">
      <span class="stat-label">settlabs.app/apdm</span>
    </div>
  </div>

  <div class="accent-line bottom"></div>
</div>
</body>
</html>
